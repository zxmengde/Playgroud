      "default_load": true,
      "duplicates": ["context-mode runtime", "SQLite context store"],
      "status": "active",
      "verification": "scripts/codex.ps1 context budget"
    },
    {
      "id": "skill-capability-routing",
      "problem": "Skill, MCP and capability choice must be explicit and auditable.",
      "source_projects": ["oh-my-codex", "everything-claude-code"],
