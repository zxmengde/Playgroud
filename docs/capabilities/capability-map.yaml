      "duplicates": ["check-agent-readiness", "finish readiness"],
      "status": "active",
      "verification": "scripts/codex.ps1 doctor"
    },
    {
      "id": "system-audit-validate-eval",
      "problem": "Reduce duplicated audit, validate and eval entrypoints.",
      "source_projects": ["everything-claude-code", "oh-my-codex"],
      "implementation": "scripts/codex.ps1 dispatches audit, validate and eval commands; private scripts live under scripts/lib/commands.",
      "entry_command": "scripts/codex.ps1 audit | validate | eval",
      "default_load": true,
      "duplicates": ["audit-*", "validate-*", "eval-*", "check-*"],
      "status": "active",
      "verification": "scripts/codex.ps1 audit; scripts/codex.ps1 validate; scripts/codex.ps1 eval"
    },
    {
      "id": "uiux-review",
      "problem": "UI/UX review must include desktop, mobile, interaction, accessibility and responsive evidence.",
      "source_projects": ["ui-ux-pro-max-skill"],
      "implementation": "Keep a local evidence-first UI/UX sample and smoke command; avoid importing a large style database.",
      "entry_command": "scripts/codex.ps1 uiux smoke",
      "default_load": false,
      "duplicates": [],
      "status": "active",
      "verification": "scripts/codex.ps1 uiux smoke"
    },
    {
